<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro | Supabase Dashboard</title>
    
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-body: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-purple: #9d4edd;
            --neon-green: #2ecc71;
            --neon-red: #e74c3c;
            --text-main: #e0e0e0;
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: var(--sidebar-w);
            background: rgba(15, 15, 18, 0.95);
            border-right: 1px solid var(--glass-border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-purple);
            text-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
            margin-bottom: 20px;
        }

        .nav-section h4 { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: #666; 
            margin-bottom: 10px;
        }

        .nav-item {
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 5px;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--glass-bg);
            border-color: var(--neon-purple);
        }

        .nav-item.active { background: var(--neon-purple); color: white; }

        /* --- CONTEÚDO --- */
        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #1a1a2e, #0a0a0c);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* --- FORMULÁRIO --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        input, select {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        button.btn-add {
            background: var(--neon-purple);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        /* --- TABELA --- */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 1px solid var(--glass-border); color: #888; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .val-entrada { color: var(--neon-green); font-weight: bold; }
        .val-saida { color: var(--neon-red); font-weight: bold; }

        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .charts-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
    </style>
</head>
<body>

    <aside>
        <div class="logo">FINANCE.PRO</div>
        
        <div class="nav-section">
            <h4>Principal</h4>
            <div class="nav-item active" onclick="location.reload()">📊 Visão Geral</div>
        </div>

        <div class="nav-section">
            <h4>Meses</h4>
            <div id="months-list"></div>
        </div>

        <div class="nav-section">
            <h4>Categorias</h4>
            <div id="categories-list">
                <div class="nav-item" onclick="filterCategory('Moradia')">🏠 Moradia</div>
                <div class="nav-item" onclick="filterCategory('Aluguel')">🔑 Aluguel</div>
                <div class="nav-item" onclick="filterCategory('Luz')">⚡ Luz</div>
            </div>
        </div>
    </aside>

    <main>
        <div class="header-top">
            <h2 id="view-title">Dashboard Geral</h2>
            <div class="glass-card" style="padding: 10px 20px; margin:0;">
                Saldo: <span id="total-balance">R$ 0,00</span>
            </div>
        </div>

        <div class="charts-container">
            <div class="glass-card"><canvas id="mainChart" height="120"></canvas></div>
            <div class="glass-card"><canvas id="pieChart"></canvas></div>
        </div>

        <div class="glass-card">
            <h3>Nova Transação</h3>
            <form id="transaction-form" class="form-grid" style="margin-top:15px;">
                <input type="text" id="desc" placeholder="Descrição" required>
                <input type="number" step="0.01" id="amount" placeholder="Valor (R$)" required>
                <select id="type">
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
                <select id="cat-select">
                    <option value="Moradia">Moradia</option>
                    <option value="Aluguel">Aluguel</option>
                    <option value="Luz">Luz</option>
                    <option value="Outros">Outros</option>
                </select>
                <select id="month-select"></select>
                <button type="submit" class="btn-add">Salvar</button>
            </form>
        </div>

        <div class="glass-card">
            <table id="transactions-table">
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Mês</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://graakrvphxxdqpceesjb.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdyYWFrcnZwaHh4ZHFwY2Vlc2piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyOTAzMjAsImV4cCI6MjA5NDg2NjMyMH0.Zf9Ntk4zXYIEwH0GSiKpTaExcQUqFtHiSm5CvRscgNM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let transactions = [];
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        let currentFilter = { month: 'all', category: 'all' };

        document.addEventListener('DOMContentLoaded', async () => {
            renderMonths();
            await fetchTransactions();
            initCharts();
        });

        async function fetchTransactions() {
            const { data, error } = await _supabase.from('transactions').select('*').order('created_at', { ascending: false });
            if (error) console.error(error);
            else {
                transactions = data.map(item => ({
                    id: item.id, desc: item.description, amount: parseFloat(item.amount),
                    type: item.type, category: item.category, month: item.month
                }));
                updateUI();
            }
        }

        document.getElementById('transaction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newTrans = {
                description: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amount').value),
                type: document.getElementById('type').value,
                category: document.getElementById('cat-select').value,
                month: document.getElementById('month-select').value
            };
            const { error } = await _supabase.from('transactions').insert([newTrans]);
            if (error) alert("Erro ao salvar!");
            else { e.target.reset(); await fetchTransactions(); }
        });

        function renderMonths() {
            const list = document.getElementById('months-list');
            const select = document.getElementById('month-select');
            months.forEach(m => {
                list.innerHTML += `<div class="nav-item" onclick="filterMonth('${m}')">📅 ${m}</div>`;
                select.innerHTML += `<option value="${m}">${m}</option>`;
            });
        }

        function updateUI() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            const filtered = transactions.filter(t => 
                (currentFilter.month === 'all' || t.month === currentFilter.month) &&
                (currentFilter.category === 'all' || t.category === currentFilter.category)
            );

            filtered.forEach(t => {
                const row = document.createElement('tr');
                row.className = 'fade-in';
                row.innerHTML = `<td>${t.desc}</td><td>${t.category}</td><td>${t.month}</td>
                    <td class="${t.type === 'entrada' ? 'val-entrada' : 'val-saida'}">R$ ${t.amount.toFixed(2)}</td>`;
                tbody.appendChild(row);
            });
            updateBalance();
            if(window.mainChart) updateCharts();
        }

        function updateBalance() {
            const total = transactions.reduce((acc, t) => t.type === 'entrada' ? acc + t.amount : acc - t.amount, 0);
            const el = document.getElementById('total-balance');
            el.innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            el.className = total >= 0 ? 'val-entrada' : 'val-saida';
        }

        function filterMonth(m) { currentFilter.month = m; currentFilter.category = 'all'; document.getElementById('view-title').innerText = m; updateUI(); }
        function filterCategory(c) { currentFilter.category = c; currentFilter.month = 'all'; document.getElementById('view-title').innerText = c; updateUI(); }

        function initCharts() {
            window.mainChart = new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: { labels: months, datasets: [{ label: 'Saldo', data: Array(12).fill(0), borderColor: '#9d4edd', tension: 0.4 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#222' } } } }
            });
            window.pieChart = new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: { labels: ['Entradas', 'Saídas'], datasets: [{ data: [0, 0], backgroundColor: ['#2ecc71', '#e74c3c'] }] }
            });
            updateCharts();
        }

        function updateCharts() {
            const monthlyData = months.map(m => transactions.filter(t => t.month === m).reduce((acc, t) => t.type === 'entrada' ? acc + t.amount : acc - t.amount, 0));
            const ent = transactions.filter(t => t.type === 'entrada').reduce((acc, t) => acc + t.amount, 0);
            const sai = transactions.filter(t => t.type === 'saida').reduce((acc, t) => acc + t.amount, 0);
            window.mainChart.data.datasets[0].data = monthlyData;
            window.mainChart.update();
            window.pieChart.data.datasets[0].data = [ent, sai];
            window.pieChart.update();
        }
    </script>
</body>
</html>
